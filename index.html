<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学城美食地图 | 发现最好吃的那家店</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation / Header -->
  <nav class="navbar glass">
    <div class="nav-content">
      <div class="logo">
        <i class="ri-map-pin-user-fill"></i>
        <span>大学城美食地图</span>
      </div>
      
      <div class="search-bar">
        <i class="ri-search-line"></i>
        <input type="text" id="searchInput" placeholder="搜索餐厅、菜系、食物...">
      </div>

      <div class="nav-links">
        <button class="icon-btn" title="我的收藏" aria-label="Favorites" onclick="openProfileTab('favorites')"><i class="ri-heart-3-line"></i></button>
        <button class="icon-btn" title="我的打卡" aria-label="Checkins" onclick="openProfileTab('checkins')"><i class="ri-map-pin-user-line"></i></button>
        <div class="user-avatar" id="userLoginBtn" onclick="handleUserClick()" style="cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); transition: all 0.2s;">
          <i class="ri-user-line" id="userIcon"></i>
          <span id="userNameText" style="font-weight: 600; font-size: 0.95rem;">登录</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content pop-in">
      <h1>发现大学城<br><span class="gradient-text">最好吃的那家店</span></h1>
      <p class="subtitle">汇聚深圳大学城（北大、清华、哈工大） 500+ 优质餐厅，专属于学生的吃货指南</p>
      
      <div class="uni-selector" id="uniSelector">
        <!-- Rendered by JS -->
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="main-container">
    
    <!-- Controls (Filters, Sort, View Toggle) -->
    <section class="controls-bar glass">
      <div class="categories-scroll" id="categoryFilters">
        <!-- Rendered by JS -->
      </div>
      
      <div class="actions">
        <div class="dropdown">
          <button class="dropdown-btn"><i class="ri-sort-desc"></i> 综合推荐</button>
          <div class="dropdown-content">
            <a href="#" data-sort="rating">评价最高</a>
            <a href="#" data-sort="distance">距离最近</a>
            <a href="#" data-sort="priceAsc">价格最低</a>
          </div>
        </div>
        
        <div class="view-toggles">
          <button class="view-btn active" data-view="grid" title="卡片视图"><i class="ri-layout-grid-fill"></i></button>
          <button class="view-btn" data-view="map" title="地图视图"><i class="ri-map-2-fill"></i></button>
        </div>
      </div>
    </section>

    <!-- Grid View -->
    <section class="restaurant-grid" id="restaurantGrid">
      <!-- Cards rendered by JS -->
    </section>

    <!-- Map View -->
    <section class="map-view hidden" id="mapView">
      <div class="map-container glass">
        <div class="map-placeholder">
          <i class="ri-map-2-line"></i>
          <h3>全景周边导览图</h3>
          <p>（此区域将挂载定制版 SVG 热力手绘地图，当前展示交互原型）</p>
          <div class="mock-map-points" id="mockMapPoints"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- Detail Modal -->
  <div class="modal hidden" id="detailModal">
    <div class="modal-overlay"></div>
    <div class="modal-content glass-card">
      <button class="close-modal"><i class="ri-close-line"></i></button>
      <div class="modal-body" id="modalBody">
        <!-- Rendered by JS -->
      </div>
      
      <!-- New Review Input Section rendered by JS in modal-body -->
    </div>
  </div>

  <!-- Auth Modal -->
  <div class="modal hidden" id="authModal">
    <div class="modal-overlay" onclick="closeAuthModal()"></div>
    <div class="modal-content glass-card" style="max-width: 400px; padding: 2rem;">
      <button class="close-modal" onclick="closeAuthModal()"><i class="ri-close-line"></i></button>
      <div style="text-align: center; margin-bottom: 2rem;">
        <i class="ri-user-smile-line" style="font-size: 3.5rem; color: var(--primary);"></i>
        <h2 style="color: #fff; margin-top: 1rem;">欢迎回来</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem;">登录后即可查收您的收藏和打卡记录</p>
      </div>
      <div style="display: flex; flex-direction: column; gap: 1rem;">
        <input type="text" id="usernameInput" placeholder="用户名 (支持任意输入即可体验体验)" class="review-textarea" style="min-height: auto; margin:0;" value="美食课代表">
        <input type="password" id="passwordInput" placeholder="密码" class="review-textarea" style="min-height: auto; margin:0;" value="123456">
        <button class="nav-btn" style="width: 100%; justify-content: center; margin-top: 1rem;" onclick="performLogin()">立 即 登 录</button>
      </div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div class="modal hidden" id="profileModal">
    <div class="modal-overlay" onclick="closeProfileModal()"></div>
    <div class="modal-content glass-card" style="max-width: 800px; padding: 2rem;">
      <button class="close-modal" onclick="closeProfileModal()"><i class="ri-close-line"></i></button>
      
      <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap;">
        <img src="https://ui-avatars.com/api/?name=User&background=ff6b00&color=fff" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary);" id="profileAvatar">
        <div>
          <h2 style="color: #fff; font-size: 1.8rem;" id="profileName">用户</h2>
          <p style="color: var(--text-muted);">吃货值：999 | 深圳大学城美食探索家</p>
        </div>
        <button class="nav-btn" style="margin-left: auto; background: rgba(255,255,255,0.1); box-shadow: none;" onclick="performLogout()">退出登录</button>
      </div>

      <div class="profile-tabs" style="display: flex; gap: 1rem; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 0.5rem;">
        <button class="cat-btn active" id="tabCheckins" onclick="switchProfileTab('checkins')">📍 我的打卡 (<span id="countCheckins">0</span>)</button>
        <button class="cat-btn" id="tabFavorites" onclick="switchProfileTab('favorites')">❤️ 我的收藏 (<span id="countFavorites">0</span>)</button>
      </div>

      <div id="profileContent" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; max-height: 400px; overflow-y: auto;">
        <!-- Content rendered here -->
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 大学城美食地图 | 深圳大学城专属版本</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
